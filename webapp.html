<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caddy-Bot: Club Selector</title>
    <style>
        /* Modern styling for your web app */
        body { font-family: sans-serif; background-color: #2c3e50; color: white; text-align: center; padding: 50px; }
        .app-container { background: #34495e; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input { padding: 10px; border-radius: 5px; border: none; margin: 10px; width: 80px; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ecc71; }
        #result { margin-top: 20px; font-size: 1.5em; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Caddy-Bot 1.0</h1>
        <p>How many yards to the pin?</p>
        <input type="number" id="distance" placeholder="Yards">
        <br>
        <button onclick="selectClub()">Get Recommendation</button>
        
        <div id="result"></div>
    </div>

    <p><a href="golf.html" style="color: #bdc3c7; text-decoration: none; margin-top: 20px; display: block;">&larr; Back to Golf Page</a></p>

    <script>
        function selectClub() {
            // Get the distance from the input box
            let yards = document.getElementById('distance').value;
            let suggestion = "";

            // The logic: This is where your "creativity" comes in!
            if (yards >= 230) {
                suggestion = "Driver or 3-Wood. Let it rip!";
            } else if (yards >= 200) {
                suggestion = "Hybrid or 4-Iron.";
            } else if (yards >= 170) {
                suggestion = "6-Iron or 7-Iron.";
            } else if (yards >= 140) {
                suggestion = "8-Iron or 9-Iron.";
            } else if (yards > 0) {
                suggestion = "Wedge time. Precision is key!";
            } else {
                suggestion = "Please enter a valid distance.";
            }

            // Display the result on the page
            document.getElementById('result').innerText = suggestion;
        }
    </script>
</body>
</html>
